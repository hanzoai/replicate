name: Release (Docker)

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/replicate
      build-args: |
        REPLICATE_VERSION=${{ github.event.release.tag_name }}
    secrets: inherit
