name: replicate
arch: "${GOARCH}"
platform: "${GOOS}"
version: "${REPLICATE_VERSION}"
section: "default"
priority: "extra"
maintainer: "Hanzo AI <ops@hanzo.ai>"
description: Replicate is a tool for real-time replication of SQLite databases.
homepage: "https://github.com/hanzoai/replicate"
license: "Apache 2"
contents:
- src: ./replicate
  dst: /usr/bin/replicate
- src: ./replicate.yml
  dst: /etc/replicate.yml
  type: config
- src: ./replicate.service
  dst: /usr/lib/systemd/system/replicate.service
  type: config
